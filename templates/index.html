<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill-Bend Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl bg-gray-800 shadow-2xl rounded-2xl p-6">

        <!-- Header -->
        <h1 class="text-2xl font-bold text-center text-white mb-1">
            🚦 Hill-Bend Safety Dashboard
        </h1>
        <p class="text-center text-gray-400 text-sm mb-5">
            IoT-Based Accident Prevention System · ESP32-CAM + YOLOv5
        </p>

        <!-- Live Video Feed -->
        <div class="border-2 border-gray-600 rounded-xl overflow-hidden mb-5">
            <img id="esp32-cam-feed"
                 class="w-full"
                 src="/video_feed"
                 alt="Live Camera Feed">
        </div>

        <!-- Status Box -->
        <div id="status-box"
             class="text-center font-bold text-xl py-4 px-6 rounded-xl bg-gray-700 text-white transition-all duration-300">
            🔄 Initializing...
        </div>

        <!-- Signal Indicators -->
        <div class="flex justify-around mt-5">
            <div class="text-center">
                <div id="left-indicator" class="w-10 h-10 rounded-full bg-green-500 mx-auto mb-1 transition-colors duration-300"></div>
                <p class="text-gray-400 text-sm">LEFT</p>
            </div>
            <div class="text-center">
                <div id="right-indicator" class="w-10 h-10 rounded-full bg-green-500 mx-auto mb-1 transition-colors duration-300"></div>
                <p class="text-gray-400 text-sm">RIGHT</p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-600 text-xs mt-5">
            Vel Tech University · Minor Project-I · Nov 2025
        </p>
    </div>

    <script>
        let previousStatus = "";
        let frameCount = 0;
        const requiredFrames = 3;

        function updateStatus() {
            fetch('/get_status')
                .then(response => response.json())
                .then(data => {
                    if (data.status === previousStatus) {
                        frameCount++;
                    } else {
                        frameCount = 1;
                    }

                    if (frameCount >= requiredFrames) {
                        const box = document.getElementById("status-box");
                        box.innerText = data.status;

                        // Update colours based on status
                        const left  = document.getElementById("left-indicator");
                        const right = document.getElementById("right-indicator");

                        if (data.status.includes("both") || data.status.includes("STOP")) {
                            box.className = "text-center font-bold text-xl py-4 px-6 rounded-xl bg-red-700 text-white transition-all duration-300";
                            left.className  = left.className.replace(/bg-\w+-500/, "bg-red-500");
                            right.className = right.className.replace(/bg-\w+-500/, "bg-red-500");
                        } else if (data.status.includes("Right lane")) {
                            box.className = "text-center font-bold text-xl py-4 px-6 rounded-xl bg-yellow-700 text-white transition-all duration-300";
                            left.className  = left.className.replace(/bg-\w+-500/, "bg-green-500");
                            right.className = right.className.replace(/bg-\w+-500/, "bg-red-500");
                        } else if (data.status.includes("Left lane")) {
                            box.className = "text-center font-bold text-xl py-4 px-6 rounded-xl bg-yellow-700 text-white transition-all duration-300";
                            left.className  = left.className.replace(/bg-\w+-500/, "bg-red-500");
                            right.className = right.className.replace(/bg-\w+-500/, "bg-green-500");
                        } else {
                            box.className = "text-center font-bold text-xl py-4 px-6 rounded-xl bg-green-700 text-white transition-all duration-300";
                            left.className  = left.className.replace(/bg-\w+-500/, "bg-green-500");
                            right.className = right.className.replace(/bg-\w+-500/, "bg-green-500");
                        }

                        // Speak alert only on status change
                        if (data.status !== previousStatus && data.status.trim() !== "") {
                            speakText(data.status.replace(/[🚦⚠️✅🟢🔄]/g, "").trim());
                        }
                    }

                    previousStatus = data.status;
                });
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const speech = new SpeechSynthesisUtterance();
            speech.text  = text;
            speech.lang  = "en-US";
            speech.rate  = 1;
            speech.pitch = 1;
            window.speechSynthesis.speak(speech);
        }

        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
